{% extends "base.html" %}

{% block title %}Login - Travel Planner{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div style="background: white; padding: 40px; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #1e1b4b 0%, #7c3aed 100%); color: white; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin: 0 auto 15px auto;">
                <i class="fas fa-lock"></i>
            </div>
            <h2 style="font-size: 1.5rem; font-weight: 800; color: #1e1b4b; margin: 0;">Protected Access</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-top: 10px;">Please enter the password to view the travel plans.</p>
        </div>

        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 8px;">Your Name</label>
                <input type="text" name="username" placeholder="e.g. Vivek or Friend" required autofocus
                       style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 1rem; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; margin-bottom: 8px;">Password</label>
                <input type="password" name="password" required
                       style="width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #e2e8f0; font-family: inherit; font-size: 1rem; box-sizing: border-box;">
            </div>
            <button type="submit" 
                    style="width: 100%; background: #1e1b4b; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s;">
                Enter Dashboard
            </button>
        </form>
    </div>
</div>
{% endblock %}
