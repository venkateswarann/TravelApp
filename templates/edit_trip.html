{% extends "base.html" %}

{% block title %}Edit Trip - {{ trip.name }}{% endblock %}

{% block content %}
<div class="card max-w-lg mx-auto mt-xl">
    <div class="card-header">
        <h2 class="card-title"><i class="fas fa-edit"></i> Edit Trip</h2>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_trip', trip_id=trip.id) }}" class="form-grid">
            <div class="form-group form-grid-full">
                <label class="form-label">Trip Name</label>
                <input type="text" name="name" class="form-control" value="{{ trip.name }}" required>
            </div>
            
            <div class="form-group form-grid-full">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ trip.description }}</textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">Start Location</label>
                <input type="text" name="start_location" class="form-control" value="{{ trip.start_location }}">
            </div>
            
            <div class="form-group">
                <label class="form-label">End Location</label>
                <input type="text" name="end_location" class="form-control" value="{{ trip.end_location }}">
            </div>
            
            <div class="form-group">
                <label class="form-label">Start Date</label>
                <input type="date" name="start_date" class="form-control" value="{{ trip.start_date.strftime('%Y-%m-%d') }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">End Date</label>
                <input type="date" name="end_date" class="form-control" value="{{ trip.end_date.strftime('%Y-%m-%d') }}" required>
            </div>
            
            <div class="form-actions form-grid-full mt-lg">
                <a href="{{ url_for('trip_detail', trip_id=trip.id) }}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<style>
.mx-auto { margin-left: auto; margin-right: auto; }
.mt-xl { margin-top: 3rem; }
</style>
{% endblock %}
